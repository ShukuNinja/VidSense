services:
  ollama:
    image: ollama/ollama:latest
    container_name: vidsense-ollama
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # GPU passthrough for the LLM. Requires the NVIDIA Container Toolkit on the
    # host. Remove this `deploy` block to run the LLM on CPU (much slower).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    build: .
    container_name: vidsense-app
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      VIDSENSE_MODEL: llama3.2:3b
      FRONTEND_DIST: /app/frontend/dist
      # SET THIS to a long random string in production (e.g. `openssl rand -hex 32`).
      # Changing it signs all users out. Provide via a .env file or host env.
      VIDSENSE_SECRET: ${VIDSENSE_SECRET:-dev-insecure-secret-change-me-in-production-0000}
    volumes:
      - vidsense-data:/app/data
    # Not published to the host — reached only through the caddy proxy below.
    # (Add `ports: ["8000:8000"]` temporarily to hit the API directly for debugging.)
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: vidsense-caddy
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  ollama-models:   # pulled models persist here
  vidsense-data:   # clips, transcripts, indexes, SQLite DB
  caddy-data:      # TLS certificates
  caddy-config:
